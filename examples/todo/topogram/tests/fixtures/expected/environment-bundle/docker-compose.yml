services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-topogram_todo}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  server:
    image: node:22-alpine
    working_dir: /app
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-topogram_todo}?schema=public
      PORT: ${SERVER_PORT:-3000}
    ports:
      - "${SERVER_PORT:-3000}:${SERVER_PORT:-3000}"
    volumes:
      - ./server:/app
    command: >
      sh -lc "npm install &&
      npm exec -- prisma generate --schema prisma/schema.prisma &&
      npm run dev"

  web:
    image: node:22-alpine
    working_dir: /app
    depends_on:
      - server
    environment:
      PUBLIC_TOPOGRAM_API_BASE_URL: http://localhost:${SERVER_PORT:-3000}
    ports:
      - "${WEB_PORT:-5173}:${WEB_PORT:-5173}"
    volumes:
      - ./web:/app
    command: >
      sh -lc "npm install &&
      npm run dev -- --host 0.0.0.0 --port ${WEB_PORT:-5173}"

volumes:
  postgres-data:
