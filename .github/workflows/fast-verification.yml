name: Fast Verification

on:
  pull_request:
    paths:
      - "engine/**"
      - "demos/**"
      - "docs/**"
      - "product/**"
      - "scripts/**"
      - "package.json"
      - "README.md"
      - ".github/workflows/fast-verification.yml"
      - ".github/workflows/publish-cli-package.yml"
  push:
    branches:
      - main
    paths:
      - "engine/**"
      - "demos/**"
      - "docs/**"
      - "product/**"
      - "scripts/**"
      - "package.json"
      - "README.md"
      - ".github/workflows/fast-verification.yml"
      - ".github/workflows/publish-cli-package.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fast:
    name: Engine semantic regression
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Run engine verification
        run: bash ./scripts/verify-engine.sh
      - name: Run CLI package verification
        run: bash ./scripts/verify-cli-package.sh
