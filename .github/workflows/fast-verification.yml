name: Fast Verification

on:
  pull_request:
    paths:
      - "engine/**"
      - "docs/**"
      - "product/**"
      - "scripts/**"
      - "topo/**"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "package.json"
      - "README.md"
      - "topogram.project.json"
      - "topogram.sdlc-policy.json"
      - ".github/pull_request_template.md"
      - ".github/workflows/fast-verification.yml"
      - ".github/workflows/publish-cli-package.yml"
      - ".github/workflows/release-status.yml"
  push:
    branches:
      - main
    paths:
      - "engine/**"
      - "docs/**"
      - "product/**"
      - "scripts/**"
      - "topo/**"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "package.json"
      - "README.md"
      - "topogram.project.json"
      - "topogram.sdlc-policy.json"
      - ".github/pull_request_template.md"
      - ".github/workflows/fast-verification.yml"
      - ".github/workflows/publish-cli-package.yml"
      - ".github/workflows/release-status.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fast:
    name: Engine semantic regression
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Run SDLC check
        run: |
          node ./engine/src/cli.js check . --json
          node ./engine/src/cli.js sdlc check --strict
      - name: Run SDLC PR gate
        if: github.event_name == 'pull_request'
        run: node ./engine/src/cli.js sdlc gate . --base origin/${{ github.base_ref }} --head HEAD --require-adopted
      - name: Run engine verification
        run: bash ./scripts/verify-engine.sh
      - name: Run CLI package verification
        run: bash ./scripts/verify-cli-package.sh
