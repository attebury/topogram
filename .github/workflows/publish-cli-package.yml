name: Publish CLI Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional package version. When supplied, it must match engine/package.json."
        required: false
        type: string
      dist_tag:
        description: "npm dist-tag"
        required: true
        default: "latest"
        type: string
      create_tag:
        description: "Create and push topogram-v<version> after publishing"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish @topogram/cli
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: "@topogram"
      - name: Check release version
        env:
          EXPECTED_TOPOGRAM_VERSION: ${{ inputs.version }}
        run: bash ./scripts/check-release-version.sh
      - name: Verify engine
        run: bash ./scripts/verify-engine.sh
      - name: Verify packed CLI
        run: bash ./scripts/verify-cli-package.sh
      - name: Publish package
        working-directory: engine
        run: npm publish --provenance --access public --tag "${{ inputs.dist_tag }}"
      - name: Create release tag
        if: ${{ inputs.create_tag }}
        run: |
          VERSION="$(node -p "require('./engine/package.json').version")"
          TAG="topogram-v$VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Release tag already exists: $TAG"
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
