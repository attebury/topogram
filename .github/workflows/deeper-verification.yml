name: Deeper Verification

on:
  pull_request:
    paths:
      - "engine/**"
      - "demos/**"
      - "product/**"
      - "scripts/**"
      - "README.md"
      - "docs/testing-strategy.md"
      - "product/app/README.md"
      - ".github/workflows/deeper-verification.yml"
  push:
    branches:
      - main
  release:
    types:
      - published
      - prereleased
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Classify changes
    runs-on: ubuntu-latest
    outputs:
      generated_canary: ${{ github.event_name == 'pull_request' && steps.filter.outputs.generated_canary || steps.defaults.outputs.generated_canary }}
      generated_demo: ${{ github.event_name == 'pull_request' && steps.filter.outputs.generated_demo || steps.defaults.outputs.generated_demo }}
    steps:
      - uses: actions/checkout@v6
        if: github.event_name == 'pull_request'
      - uses: dorny/paths-filter@v3
        if: github.event_name == 'pull_request'
        id: filter
        with:
          filters: |
            generated_canary:
              - "engine/src/generator/**"
              - "engine/src/realization/**"
              - "engine/src/example-implementation.js"
              - "engine/src/generator/runtime/**"
            generated_demo:
              - "demos/generated/**"
              - "engine/**"
              - "scripts/verify-generated-demo.sh"
      - id: defaults
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "generated_canary=true"
            echo "generated_demo=true"
          } >> "$GITHUB_OUTPUT"

  generated-demo:
    name: Generated demo workflow
    runs-on: ubuntu-latest
    needs:
      - changes
    if: >-
      github.event_name != 'pull_request' ||
      needs.changes.outputs.generated_demo == 'true'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Run generated demo verification
        run: bash ./scripts/verify-generated-demo.sh todo-demo-app compile
