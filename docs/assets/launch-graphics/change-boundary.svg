<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">Topogram change boundary</title>
  <desc id="desc">A polished launch graphic showing safe, guarded, and no-go maintained app change classes.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f5ed"/>
      <stop offset="100%" stop-color="#efe7d8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#2e362b" flood-opacity="0.14"/>
    </filter>
    <style>
      .kicker { font: 700 16px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0.12em; text-transform: uppercase; fill: #6a765f; }
      .headline { font: 700 50px Georgia, "Times New Roman", serif; fill: #192217; }
      .subhead { font: 400 22px Georgia, "Times New Roman", serif; fill: #465243; }
      .cardTitle { font: 700 30px Georgia, "Times New Roman", serif; fill: #1c2418; }
      .status { font: 700 14px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0.1em; text-transform: uppercase; }
      .body { font: 400 18px Georgia, "Times New Roman", serif; fill: #455244; }
      .result { font: 700 18px Georgia, "Times New Roman", serif; fill: #243220; }
    </style>
  </defs>

  <rect width="1440" height="760" fill="url(#bg)"/>
  <text x="110" y="96" class="kicker">Maintained-app proof</text>
  <text x="110" y="160" class="headline">Topogram knows where to stop</text>
  <text x="110" y="218" class="subhead">The strongest alpha proof is not only what Topogram accepts. It is also how clearly it distinguishes direct mirrors, human-owned decisions, and no-go changes.</text>

  <g filter="url(#shadow)">
    <rect x="90" y="290" rx="32" ry="32" width="380" height="360" fill="#eef5e5"/>
    <rect x="530" y="290" rx="32" ry="32" width="380" height="360" fill="#f7efd8"/>
    <rect x="970" y="290" rx="32" ry="32" width="380" height="360" fill="#f6e2dc"/>
  </g>

  <g>
    <text x="130" y="340" class="status" fill="#537242">Safe</text>
    <text x="130" y="388" class="cardTitle">Mirror emitted behavior</text>
    <text x="130" y="438" class="body">Example:</text>
    <text x="130" y="468" class="body">Issues ownership visibility</text>
    <text x="130" y="516" class="body">Topogram can update a maintained</text>
    <text x="130" y="544" class="body">presenter when the emitted surface</text>
    <text x="130" y="572" class="body">moves in a directly mappable way.</text>
    <text x="130" y="622" class="result">Expected behavior: accept and mirror.</text>
  </g>

  <g>
    <text x="570" y="340" class="status" fill="#8b6e2a">Guarded</text>
    <text x="570" y="388" class="cardTitle">Keep product judgment human-owned</text>
    <text x="570" y="438" class="body">Example:</text>
    <text x="570" y="468" class="body">Content Approval workflow decision</text>
    <text x="570" y="516" class="body">Topogram can identify the affected</text>
    <text x="570" y="544" class="body">surface, but final UX treatment still</text>
    <text x="570" y="572" class="body">belongs to a human decision-maker.</text>
    <text x="570" y="622" class="result">Expected behavior: review required.</text>
  </g>

  <g>
    <text x="1010" y="340" class="status" fill="#96554c">No-go</text>
    <text x="1010" y="388" class="cardTitle">Stop clearly instead of drifting</text>
    <text x="1010" y="438" class="body">Example:</text>
    <text x="1010" y="468" class="body">Unsupported or drifting maintained</text>
    <text x="1010" y="496" class="body">surface such as unstable owner logic</text>
    <text x="1010" y="544" class="body">When the mapping is no longer safe,</text>
    <text x="1010" y="572" class="body">Topogram should reject the move</text>
    <text x="1010" y="600" class="body">instead of pretending confidence.</text>
    <text x="1010" y="622" class="result">Expected behavior: stop and say no.</text>
  </g>
</svg>
