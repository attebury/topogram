<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">Topogram brownfield reconcile flow</title>
  <desc id="desc">A polished launch graphic showing import, reconcile, review, adopt, and canonical Topogram in the brownfield flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6f3eb"/>
      <stop offset="100%" stop-color="#e9e0cf"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#31392e" flood-opacity="0.14"/>
    </filter>
    <style>
      .kicker { font: 700 16px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0.12em; text-transform: uppercase; fill: #6a765f; }
      .headline { font: 700 50px Georgia, "Times New Roman", serif; fill: #1b2319; }
      .subhead { font: 400 22px Georgia, "Times New Roman", serif; fill: #455142; }
      .step { font: 700 28px Georgia, "Times New Roman", serif; fill: #1e281b; }
      .body { font: 400 18px Georgia, "Times New Roman", serif; fill: #455244; }
      .label { font: 700 14px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0.1em; text-transform: uppercase; fill: #738167; }
      .arrow { stroke: #708064; stroke-width: 6; fill: none; stroke-linecap: round; }
      .dash { stroke: #8c9885; stroke-width: 4; fill: none; stroke-dasharray: 10 10; }
    </style>
  </defs>

  <rect width="1440" height="760" fill="url(#bg)"/>
  <text x="110" y="96" class="kicker">Brownfield workflow</text>
  <text x="110" y="160" class="headline">Import, reconcile, review, adopt</text>
  <text x="110" y="218" class="subhead">Topogram's brownfield story is a selective workflow with explicit review gates, not a blind rewrite of an existing system.</text>

  <g filter="url(#shadow)">
    <rect x="80" y="320" rx="30" ry="30" width="220" height="190" fill="#fffaf0"/>
    <rect x="350" y="320" rx="30" ry="30" width="250" height="190" fill="#fffaf0"/>
    <rect x="650" y="300" rx="34" ry="34" width="240" height="230" fill="#f4efdf"/>
    <rect x="940" y="320" rx="30" ry="30" width="220" height="190" fill="#fffaf0"/>
    <rect x="1210" y="320" rx="30" ry="30" width="180" height="190" fill="#eef3e3"/>
  </g>

  <g>
    <text x="110" y="356" class="label">1</text>
    <text x="110" y="400" class="step">Import</text>
    <text x="110" y="438" class="body">Collect app and docs evidence</text>
    <text x="110" y="466" class="body">from real existing software.</text>
  </g>

  <g>
    <text x="380" y="356" class="label">2</text>
    <text x="380" y="400" class="step">Reconcile</text>
    <text x="380" y="438" class="body">Cluster evidence into candidate</text>
    <text x="380" y="466" class="body">bundles, model files, and review surfaces.</text>
  </g>

  <g>
    <text x="680" y="336" class="label">3</text>
    <text x="680" y="380" class="step">Review gate</text>
    <text x="680" y="420" class="body">Approve bundle, projection, and</text>
    <text x="680" y="448" class="body">workflow review groups before</text>
    <text x="680" y="476" class="body">canonical promotion moves ahead.</text>
  </g>

  <g>
    <text x="970" y="356" class="label">4</text>
    <text x="970" y="400" class="step">Adopt</text>
    <text x="970" y="438" class="body">Promote only approved canonical</text>
    <text x="970" y="466" class="body">Topogram surfaces.</text>
  </g>

  <g>
    <text x="1240" y="356" class="label">5</text>
    <text x="1240" y="400" class="step">Canonical</text>
    <text x="1240" y="438" class="body">Durable</text>
    <text x="1240" y="466" class="body">Topogram</text>
  </g>

  <path class="arrow" d="M300 414 C320 414, 330 414, 350 414"/>
  <polygon points="340,400 365,414 340,428" fill="#708064"/>
  <path class="arrow" d="M600 414 C620 414, 630 414, 650 414"/>
  <polygon points="640,400 665,414 640,428" fill="#708064"/>
  <path class="arrow" d="M890 414 C910 414, 920 414, 940 414"/>
  <polygon points="930,400 955,414 930,428" fill="#708064"/>
  <path class="arrow" d="M1160 414 C1180 414, 1190 414, 1210 414"/>
  <polygon points="1200,400 1225,414 1200,428" fill="#708064"/>

  <g>
    <rect x="340" y="590" rx="24" ry="24" width="290" height="90" fill="#e9ebdc"/>
    <text x="370" y="626" class="label">Review-required side surfaces</text>
    <text x="370" y="658" class="body">Journey drafts and auth hints</text>
  </g>
  <path class="dash" d="M470 320 C470 250, 485 230, 520 210"/>
  <path class="dash" d="M500 590 C500 544, 500 520, 500 510"/>
</svg>
